<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<title>V-Log プロンプター</title>
<style>
  /* ===== テーマ変数 ===== */
  :root {
    --bg-app: #0e0e10;
    --bg-editor-end: #1a1a1f;
    --bg-stage: #000;
    --bg-input: #18181c;
    --bg-nav-hover: #1a1a1a;
    --border-subtle: #2a2a30;
    --border-stage: #1a1a1a;
    --text-primary: #ffffff;
    --text-muted: #9aa0a6;
    --text-dim: #555;
    --accent: #4a90ff;
    --accent-hover: #5fa0ff;
    --accent-deep: #1f5fd6;
    --warn: #ffb84a;
    --glass-bg: rgba(20, 20, 24, 0.85);
    --glass-border: rgba(255, 255, 255, 0.08);
    --font-stack: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
  }

  /* ===== 全体リセット ===== */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: var(--font-stack);
  }
  body { background: var(--bg-app); color: var(--text-primary); }

  /* ===== エディタモード ===== */
  #editor {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 32px;
    background: linear-gradient(135deg, var(--bg-editor-end) 0%, var(--bg-app) 100%);
  }
  #editor h1 {
    font-size: 28px; font-weight: 600;
    margin-bottom: 8px; letter-spacing: 0.05em;
  }
  #editor p.desc {
    font-size: 14px; color: var(--text-muted);
    margin-bottom: 24px;
  }
  #scriptInput {
    width: min(900px, 100%); height: 60vh;
    background: var(--bg-input); color: var(--text-primary);
    border: 1px solid var(--border-subtle); border-radius: 12px;
    padding: 20px; font-size: 16px; line-height: 1.7;
    resize: none; outline: none;
    transition: border-color 0.2s;
  }
  #scriptInput:focus { border-color: var(--accent); }
  #startBtn {
    margin-top: 20px;
    background: var(--accent); color: var(--text-primary);
    border: none; padding: 14px 36px;
    font-size: 16px; font-weight: 600;
    border-radius: 999px; cursor: pointer;
    letter-spacing: 0.05em;
    transition: background 0.2s, transform 0.1s;
  }
  #startBtn:hover { background: var(--accent-hover); }
  #startBtn:active { transform: scale(0.98); }

  /* ===== プレゼンテーションモード ===== */
  #presenter {
    display: none;
    width: 100%; height: 100%;
    background: var(--bg-stage); color: var(--text-primary);
    position: relative;
    user-select: none; cursor: pointer;
  }
  #presenter.active { display: flex; }

  /* 左：ナビゲーター（比率 1） */
  #navList {
    flex: 1; height: 100%;
    overflow-y: auto;
    padding: 40px 20px;
    font-size: 14px; line-height: 1.8;
    color: var(--text-dim);
    border-right: 1px solid var(--border-stage);
    scroll-behavior: smooth;
  }
  #navList::-webkit-scrollbar { width: 6px; }
  #navList::-webkit-scrollbar-track { background: transparent; }
  #navList::-webkit-scrollbar-thumb { background: #222; border-radius: 3px; }

  .nav-page {
    padding: 12px 14px; margin-bottom: 10px;
    border-radius: 6px;
    white-space: pre-wrap; word-break: break-word;
    cursor: pointer;
    transition: background 0.25s, color 0.25s;
  }
  .nav-page:hover:not(.current) {
    background: var(--bg-nav-hover);
    color: #aaa;
  }
  .nav-page.current {
    background: var(--accent-deep);
    color: var(--text-primary);
    font-weight: 500;
  }

  /* 右：メイン表示（比率 5） */
  #mainDisplay {
    flex: 5; height: 100%;
    display: flex; align-items: center; justify-content: center;
    padding: 60px;
    overflow: hidden;
  }
  #mainText {
    width: 100%; max-height: 100%;
    overflow: hidden;
    font-size: 72px; font-weight: 600;
    line-height: 1.6; letter-spacing: 0.03em;
    text-align: center;
    white-space: pre-wrap; word-break: break-word;
  }

  /* ===== ホバー時に現れるオーバーレイ ===== */
  /* fade: 透明度のみ制御。glass: ガラス調背景＋枠。両者を組み合わせて使う */
  .fade {
    position: absolute;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
    z-index: 10;
  }
  #presenter:hover .fade,
  #presenter:focus-within .fade { opacity: 1; }
  #presenter:hover #controls,
  #presenter:focus-within #controls { pointer-events: auto; }
  .glass {
    background: var(--glass-bg);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid var(--glass-border);
  }

  #controls {
    bottom: 24px; right: 24px;
    border-radius: 12px;
    padding: 14px 18px;
    display: flex; align-items: center; gap: 14px;
  }
  #controls label {
    font-size: 12px; color: var(--text-muted);
    white-space: nowrap;
  }
  #controls.auto-fit label[for="fontSlider"]::after {
    content: ' (自動調整中)';
    color: var(--warn);
  }
  #fontSlider {
    width: 160px;
    accent-color: var(--accent);
    cursor: pointer;
  }
  #fontSlider:disabled { opacity: 0.4; cursor: not-allowed; }
  #fontValue {
    font-size: 12px; color: var(--text-primary);
    min-width: 38px; text-align: right;
  }
  #exitBtn {
    background: transparent; color: var(--text-primary);
    border: 1px solid rgba(255, 255, 255, 0.2);
    padding: 6px 12px; border-radius: 6px;
    font-size: 12px; cursor: pointer;
    transition: background 0.2s;
  }
  #exitBtn:hover { background: rgba(255, 255, 255, 0.1); }

  #pageIndicator {
    top: 24px; right: 24px;
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 12px; color: var(--text-muted);
  }

  #hint {
    bottom: 24px; left: 50%;
    transform: translateX(-50%);
    font-size: 12px; color: var(--text-dim);
  }
</style>
</head>
<body>

<!-- ===== エディタモード ===== -->
<div id="editor">
  <h1>V-Log プロンプター</h1>
  <p class="desc">原稿を貼り付けてください。空行（Enter 2回）でページが区切られます。</p>
  <textarea id="scriptInput" placeholder="ここに原稿を貼り付け…&#10;&#10;空行で次のページに区切られます。"></textarea>
  <button id="startBtn">プロンプター開始</button>
</div>

<!-- ===== プレゼンテーションモード ===== -->
<div id="presenter">
  <div id="navList"></div>

  <div id="mainDisplay">
    <div id="mainText"></div>
  </div>

  <div id="pageIndicator" class="fade glass">1 / 1</div>

  <div id="controls" class="fade glass">
    <label for="fontSlider">文字サイズ</label>
    <input type="range" id="fontSlider" min="24" max="160" value="72" step="2">
    <span id="fontValue">72px</span>
    <button id="exitBtn">終了</button>
  </div>

  <div id="hint" class="fade">左クリック: 次へ ／ 右クリック: 前へ</div>
</div>

<script>
(() => {
  'use strict';

  // ===== 定数 =====
  const STORAGE_KEY      = 'vlog-prompter-script';
  const DEFAULT_FONT_PX  = 72;
  const MIN_FONT_PX      = 24; // スライダー下限と一致させる
  const FIT_STEP_PX      = 2;
  const SAMPLE_SCRIPT =
    'こんにちは、今日のV-Logへようこそ。\n今日は新しいカメラで撮影しています。\n\n' +
    '最初に紹介したいのは、このプロンプターアプリです。\n空行でページが切り替わります。\n\n' +
    '左クリックで次のページ、右クリックで前のページに戻れます。\n撮影に集中できるシンプルな設計です。\n\n' +
    '画面右下にマウスを移動すると、文字サイズを調整するスライダーが表示されます。\n\n' +
    'それでは、素敵な撮影を！';

  // ===== DOM 参照を一箇所に集約 =====
  const $ = (id) => document.getElementById(id);
  const dom = {
    editor:        $('editor'),
    scriptInput:   $('scriptInput'),
    startBtn:      $('startBtn'),
    presenter:     $('presenter'),
    navList:       $('navList'),
    mainDisplay:   $('mainDisplay'),
    mainText:      $('mainText'),
    pageIndicator: $('pageIndicator'),
    controls:      $('controls'),
    fontSlider:    $('fontSlider'),
    fontValue:     $('fontValue'),
    exitBtn:       $('exitBtn'),
  };

  // ===== 状態 =====
  const state = {
    pages: [],
    currentIndex: 0,
    userFontPx: DEFAULT_FONT_PX, // スライダー値（自動縮小の上限）
  };

  // ===== ストレージ（localStorage を thin wrap） =====
  const storage = {
    save(text) {
      try { localStorage.setItem(STORAGE_KEY, text); } catch (_) { /* noop */ }
    },
    load() {
      try { return localStorage.getItem(STORAGE_KEY); } catch (_) { return null; }
    },
  };

  // ===== 原稿をページに分割（空行＝改行2回で区切る）=====
  const splitIntoPages = (text) =>
    text.replace(/\r\n/g, '\n')
        .split(/\n\s*\n+/)
        .map((s) => s.trim())
        .filter((s) => s.length > 0);

  // ===== ナビゲーター構築 =====
  function buildNavigator() {
    const frag = document.createDocumentFragment();
    state.pages.forEach((page, i) => {
      const div = document.createElement('div');
      div.className = 'nav-page';
      div.textContent = page;
      div.dataset.index = i;
      div.addEventListener('click', (e) => {
        e.stopPropagation();
        showPage(i);
      });
      div.addEventListener('contextmenu', (e) => {
        e.preventDefault();
        e.stopPropagation();
      });
      frag.appendChild(div);
    });
    dom.navList.replaceChildren(frag);
  }

  // ===== オーバーフロー判定 =====
  // #mainDisplay には padding があり clientHeight/Width はパディングを含むため、
  // クリッピングを正しく検知できる mainText 自身の clientHeight/Width を基準にする。
  // mainText は width:100% / max-height:100% / overflow:hidden なので、
  // scrollHeight/Width が clientHeight/Width を超えると実際に切れている。
  const isOverflowing = () =>
    dom.mainText.scrollHeight > dom.mainText.clientHeight ||
    dom.mainText.scrollWidth  > dom.mainText.clientWidth;

  // ===== オーバーフロー時のみ自動縮小（二分探索で最大サイズを探す）=====
  // 上限はユーザーのスライダー値。下限は MIN_FONT_PX。
  function fitTextToDisplay() {
    dom.mainText.style.fontSize = state.userFontPx + 'px';
    if (!isOverflowing()) {
      applyAutoFitUI(false, state.userFontPx);
      return;
    }

    // 二分探索：[MIN_FONT_PX, userFontPx] の範囲で「収まる最大サイズ」を求める
    let lo = MIN_FONT_PX;
    let hi = state.userFontPx;
    let best = MIN_FONT_PX;
    while (lo <= hi) {
      const mid = Math.floor((lo + hi) / (2 * FIT_STEP_PX)) * FIT_STEP_PX;
      const trial = Math.max(MIN_FONT_PX, mid);
      dom.mainText.style.fontSize = trial + 'px';
      if (!isOverflowing()) {
        best = trial;
        lo = trial + FIT_STEP_PX;
      } else {
        hi = trial - FIT_STEP_PX;
      }
      if (trial === MIN_FONT_PX && isOverflowing()) break;
    }
    dom.mainText.style.fontSize = best + 'px';
    applyAutoFitUI(true, best);
  }

  // 自動縮小モードの UI 反映
  function applyAutoFitUI(active, displayPx) {
    dom.controls.classList.toggle('auto-fit', active);
    dom.fontSlider.disabled = active;
    dom.fontValue.textContent = displayPx + 'px';
  }

  // ===== ページ表示 =====
  function showPage(index) {
    if (state.pages.length === 0) return;
    state.currentIndex = Math.max(0, Math.min(index, state.pages.length - 1));

    dom.mainText.textContent = state.pages[state.currentIndex];
    fitTextToDisplay();
    dom.pageIndicator.textContent = `${state.currentIndex + 1} / ${state.pages.length}`;

    updateNavHighlight();
  }

  // 左ナビのハイライト更新＋中央スクロール
  function updateNavHighlight() {
    const items = dom.navList.querySelectorAll('.nav-page');
    items.forEach((el, i) => el.classList.toggle('current', i === state.currentIndex));

    const currentEl = items[state.currentIndex];
    if (!currentEl) return;
    const navRect = dom.navList.getBoundingClientRect();
    const elRect  = currentEl.getBoundingClientRect();
    const offset  = (elRect.top + elRect.height / 2) - (navRect.top + navRect.height / 2);
    dom.navList.scrollTo({ top: dom.navList.scrollTop + offset, behavior: 'smooth' });
  }

  // ===== モード切替 =====
  function enterPresentation() {
    const text = dom.scriptInput.value;
    const pages = splitIntoPages(text);
    if (pages.length === 0) {
      alert('原稿が空です。テキストを入力してください。');
      return;
    }
    storage.save(text);
    state.pages = pages;
    state.currentIndex = 0;
    buildNavigator();
    dom.editor.style.display = 'none';
    dom.presenter.classList.add('active');
    showPage(0);
  }

  function exitPresentation() {
    dom.presenter.classList.remove('active');
    dom.editor.style.display = 'flex';
  }

  // ===== ナビゲーション操作（クランプは showPage 側で）=====
  const goNext = () => showPage(state.currentIndex + 1);
  const goPrev = () => showPage(state.currentIndex - 1);

  // ===== イベントバインド =====
  function bindEvents() {
    dom.startBtn.addEventListener('click', enterPresentation);
    dom.exitBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      exitPresentation();
    });

    // 原稿入力を都度保存
    dom.scriptInput.addEventListener('input', () => storage.save(dom.scriptInput.value));

    // プレゼン領域：左クリック=次／右クリック=前。
    // コントロール類とナビゲーター領域（スクロールバーや余白を含む）は対象外。
    // ナビゲーター内の .nav-page クリックはそれぞれの handler で stopPropagation 済み。
    const isNavOrControls = (target) =>
      target.closest('#controls') ||
      target.closest('#pageIndicator') ||
      target.closest('#navList');

    dom.presenter.addEventListener('click', (e) => {
      if (isNavOrControls(e.target)) return;
      goNext();
    });
    dom.presenter.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      if (isNavOrControls(e.target)) return;
      goPrev();
    });

    // フォントサイズスライダー
    dom.fontSlider.addEventListener('input', () => {
      state.userFontPx = parseInt(dom.fontSlider.value, 10);
      fitTextToDisplay();
    });
    // スライダー操作中のクリックでページ送りされないように
    ['mousedown', 'click'].forEach((ev) =>
      dom.fontSlider.addEventListener(ev, (e) => e.stopPropagation())
    );

    // リサイズで再フィット
    window.addEventListener('resize', () => {
      if (dom.presenter.classList.contains('active')) fitTextToDisplay();
    });

    // キーボードショートカット
    // フォーカスがフォーム部品（スライダー・ボタン等）にある場合は、
    // 矢印キーやスペースをそちらの操作として扱わせるためショートカットを抑止する。
    const isFormControl = (el) =>
      el && (el.tagName === 'INPUT' || el.tagName === 'BUTTON' ||
             el.tagName === 'TEXTAREA' || el.tagName === 'SELECT');

    document.addEventListener('keydown', (e) => {
      if (!dom.presenter.classList.contains('active')) return;
      // Esc は常に有効（撮影中の即時離脱用）
      if (e.key === 'Escape') { exitPresentation(); return; }
      if (isFormControl(e.target)) return;
      switch (e.key) {
        case 'ArrowDown': case 'ArrowRight': case ' ': case 'PageDown':
          e.preventDefault(); goNext(); break;
        case 'ArrowUp': case 'ArrowLeft': case 'PageUp':
          e.preventDefault(); goPrev(); break;
      }
    });
  }

  // ===== 初期化 =====
  function init() {
    const saved = storage.load();
    dom.scriptInput.value = (saved && saved.length > 0) ? saved : SAMPLE_SCRIPT;
    bindEvents();
  }

  init();
})();
</script>
</body>
</html>
